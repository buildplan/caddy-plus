name: 🧘 Keep Workflows Active

on:
  schedule:
    # Run on the 1st day of every month at 3:30 AM
    - cron: '30 3 1 * *'
  workflow_dispatch:

jobs:
  update-timestamp:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - name: Update activity timestamp
        run: |
          mkdir -p .github/activity
          echo "$(date -u +'%Y-%m-%dT%H:%M:%SZ')" > .github/activity/timestamp

      - name: Commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore(activity): Update timestamp to keep workflows active"
          file_pattern: ".github/activity/timestamp"
          commit_user_name: "buildplan"
          commit_user_email: "hello@buildplan.org"
          commit_author: "buildplan <hello@buildplan.org>"
          branch: repo-keepalive
          create_branch: true
          push_options: '--force'
